services:
  carrete:
    build: .
    image: carrete:latest
    container_name: carrete
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data      # SQLite DB
      - ./photos:/app/photos  # fotos originales + thumbs
    environment:
      DATABASE_URL: file:/app/data/carrete.db
      PHOTOS_DIR: /app/photos
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
